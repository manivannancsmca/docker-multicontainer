version: "3.9"

# ================================================================
# Services
# ================================================================
services:

  # ------------------------------------------------------------
  # MySQL 8.0 Database
  # ------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: app_mysql
    hostname: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootSecurePass123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-appdb}
      MYSQL_USER: ${MYSQL_APP_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD:-appSecurePass123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootSecurePass123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ------------------------------------------------------------
  # Spring Boot Application - Instance 1
  # ------------------------------------------------------------
  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_instance_1
    hostname: app1
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-appdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_APP_USER:-appuser}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_APP_PASSWORD:-appSecurePass123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8081:8080"
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ------------------------------------------------------------
  # Spring Boot Application - Instance 2
  # ------------------------------------------------------------
  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_instance_2
    hostname: app2
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-appdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_APP_USER:-appuser}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_APP_PASSWORD:-appSecurePass123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8082:8080"
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ------------------------------------------------------------
  # Spring Boot Application - Instance 3
  # ------------------------------------------------------------
  app3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_instance_3
    hostname: app3
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-appdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_APP_USER:-appuser}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_APP_PASSWORD:-appSecurePass123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8083:8080"
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

# ================================================================
# Volumes
# ================================================================
volumes:
  mysql_data:
    driver: local

# ================================================================
# Networks
# ================================================================
networks:
  app_network:
    driver: bridge
    name: app_bridge_network